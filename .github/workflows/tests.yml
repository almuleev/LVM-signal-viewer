name: tests

on:
  push:
  pull_request:

jobs:
  parser-tests:
    runs-on: windows-latest
    env:
      MPLBACKEND: Agg
      PYTHONUTF8: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile check
        run: python -m compileall .

      - name: Run tests
        run: pytest tests -q
